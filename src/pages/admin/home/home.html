<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store — Panel de Administración</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <link rel="icon" href="/assets/favicon.ico" />
    <script type="module" src="./home.ts"></script>

</head>

<body class="no-aside" style="visibility:hidden">

    <header>
        <div class="header-left">
            <span class="admin-badge">Admin</span>
            <h1>Panel de Administración</h1>
        </div>
        <div id="userInfoBox" class="header-user" hidden>
            logueado como: <span id="userEmail"></span> Rol: <span id="userRole"></span>
        </div>
        <div class="header-actions">
            <a href="/src/pages/store/home/home.html" class="btn-back">← Volver a la Tienda</a>
            <button id="logoutButton" class="btn-back btn-logout">Cerrar Sesión</button>
        </div>
    </header>

    <main class="admin-main">

        <section>
            <div class="section-header">
                <h2>Inventario de Productos</h2>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- Las filas se cargan dinámicamente desde data.ts -->
                    </tbody>
                </table>
            </div>
        </section>

        <details>
            <summary>
                ＋ Agregar Producto Rápido
            </summary>
            <div class="form-body">
                <form action="#" method="POST">
                    <div class="form-grid">

                        <div class="form-group">
                            <label for="prod-name">Nombre del Producto</label>
                            <input type="text" id="prod-name" name="nombre" placeholder="Ej: Pizza Napolitana"
                                required />
                        </div>

                        <div class="form-group">
                            <label for="prod-price">Precio ($)</label>
                            <input type="number" id="prod-price" name="precio" placeholder="Ej: 5500" min="0" step="50"
                                required />
                        </div>

                        <div class="form-group">
                            <label for="prod-cat">Categoría</label>
                            <div class="select-wrap">
                                <select id="prod-cat" name="categoria" required>
                                    <option value="" disabled selected>Seleccionar…</option>
                                    <option value="hamburguesas">🍔 Hamburguesas</option>
                                    <option value="pizzas">🍕 Pizzas</option>
                                    <option value="tacos">🌮 Tacos</option>
                                    <option value="papas">🍟 Papas Fritas</option>
                                    <option value="ensaladas">🥗 Ensaladas</option>
                                    <option value="postres">🍰 Postres</option>
                                    <option value="bebidas">🍺 Bebidas</option>
                                </select>
                            </div>
                        </div>

                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Agregar Producto</button>
                        <button type="reset" class="btn-cancel">Limpiar</button>
                    </div>
                </form>
            </div>
        </details>

    </main>

    <footer>
        <div class="footer-brand">Food<span>Store</span></div>
        <div class="footer-copy">© 2026 Pedro Hidalgo.</div>
    </footer>

</body>

</html>
